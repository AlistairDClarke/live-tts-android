name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            openjdk-17-jdk \
            autoconf \
            automake \
            libtool \
            libltdl-dev \
            libffi-dev \
            libssl-dev \
            zlib1g-dev \
            cmake \
            gcc \
            g++ \
            gfortran \
            git \
            wget \
            unzip \
            zip \
            libsndfile1 \
            libsndfile1-dev

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install buildozer cython virtualenv

      - name: Cache Buildozer global dir
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Build APK
        working-directory: ${{ github.workspace }}
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          export FC=gfortran
          export FCFLAGS=""
          export FFLAGS=""
          bash -c 'set -o pipefail; yes 2>/dev/null | buildozer -v android debug 2>&1 | tee build.log'

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LiveTTS-APK
          path: |
            bin/*.apk
            *.apk
        if: always()

      - name: Upload build log
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
        if: always()
