name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build APK with Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/home/user/hostcwd \
            -v ${{ github.workspace }}/.buildozer:/home/user/.buildozer \
            kivy/buildozer \
            bash -c '
              cd /home/user/hostcwd && \
              JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64 \
              yes 2>/dev/null | buildozer -v android debug 2>&1 | tee build.log
            '

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LiveTTS-APK
          path: |
            bin/*.apk
            *.apk
        if: always()

      - name: Upload build log
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
        if: always()
