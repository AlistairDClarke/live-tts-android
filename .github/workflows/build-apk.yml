name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            openjdk-17-jdk autoconf automake libtool libltdl-dev \
            libffi-dev libssl-dev zlib1g-dev cmake gcc g++ git \
            wget unzip zip

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install buildozer cython virtualenv

      - name: First pass (setup p4a and SDK)
        continue-on-error: true
        working-directory: ${{ github.workspace }}
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          yes | buildozer -v android debug 2>&1 | tee build-first.log; true

      - name: Patch thorvg recipe (remove broken libomp copy)
        run: |
          python3 << 'PYEOF'
          import glob as g, os
          for f in g.glob(os.path.expanduser("~/.buildozer/**/recipes/libthorvg/__init__.py"), recursive=True):
              with open(f) as fh:
                  lines = fh.readlines()
              new_lines = []
              skip = False
              for line in lines:
                  if "libomp" in line or "clang_lib_dir" in line:
                      skip = True
                      new_lines.append("            # libomp copy skipped (NDK 25b compat)\n")
                  elif skip and line.strip() == "":
                      skip = False
                      continue
                  elif skip:
                      continue
                  else:
                      new_lines.append(line)
              with open(f, "w") as fh:
                  fh.writelines(new_lines)
              print(f"Patched thorvg: {f}")
          PYEOF
        if: always()

      - name: Build APK (retry)
        working-directory: ${{ github.workspace }}
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          yes | buildozer -v android debug 2>&1 | tee build.log; test ${PIPESTATUS[0]} -eq 0

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LiveTTS-APK
          path: |
            bin/*.apk
            *.apk
        if: always()

      - name: Upload build log
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
        if: always()
