name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            openjdk-17-jdk autoconf automake libtool libltdl-dev \
            libffi-dev libssl-dev zlib1g-dev cmake gcc g++ git \
            wget unzip zip

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install buildozer cython virtualenv

      - name: First pass (setup p4a and SDK)
        continue-on-error: true
        working-directory: ${{ github.workspace }}
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          yes | buildozer -v android debug 2>&1 | tee build-first.log; true

      - name: Patch thorvg recipe (wrap glob in try/except for NDK 25b)
        run: |
          find ~/.buildozer -name "__init__.py" -path "*/recipes/libthorvg/*" | while read f; do
            sed -i 's|clang_lib_dir = glob(pattern)\[0\]|try:\n            clang_lib_dir = glob(pattern)[0]\n            libomp = join(clang_lib_dir, "libomp.so")\n            shprint(sh.cp, libomp, join("install", "lib"))\n        except (IndexError, FileNotFoundError):\n            print("WARNING: libomp.so not found, skipping")\n|' "$f"
            sed -i '/shprint(sh\.cp, libomp, join("install", "lib"))/d' "$f"
            echo "Patched thorvg: $f"
          done
        if: always()

      - name: Build APK (retry)
        working-directory: ${{ github.workspace }}
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          yes | buildozer -v android debug 2>&1 | tee build.log; test ${PIPESTATUS[0]} -eq 0

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LiveTTS-APK
          path: |
            bin/*.apk
            *.apk
        if: always()

      - name: Upload build log
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
        if: always()
